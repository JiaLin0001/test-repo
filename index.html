<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test App - 部署成功！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        .success {
            color: #10b981;
            font-size: 4em;
            margin-bottom: 20px;
        }
        .info {
            background: #f3f4f6;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: left;
        }
        .info h3 {
            color: #374151;
            margin-bottom: 10px;
        }
        .info p {
            color: #6b7280;
            line-height: 1.6;
        }
        .demo-section {
            margin-top: 30px;
        }
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            margin: 10px;
            cursor: pointer;
            border: none;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .result {
            background: #ecfdf5;
            border: 2px solid #10b981;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            min-height: 60px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result p {
            color: #065f46;
            margin: 0;
        }
        .badge {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.875em;
            margin: 5px;
        }
        .footer {
            margin-top: 30px;
            color: #9ca3af;
            font-size: 0.875em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success">🎉</div>
        <h1>部署成功！</h1>
        <div class="info">
            <h3>项目信息</h3>
            <p>这是一个测试项目，通过 GitHub Pages 部署。</p>
            <p><strong>技术栈：</strong> HTML + JavaScript</p>
            <p><strong>部署平台：</strong> GitHub Pages</p>
        </div>
        <div class="demo-section">
            <h3>测试功能</h3>
            <p style="margin: 15px 0; color: #6b7280;">点击按钮测试 API 功能（前端模拟）：</p>
            <button class="btn" onclick="greet('World')">问候 World</button>
            <button class="btn" onclick="greet('OpenClaw')">问候 OpenClaw</button>
            <button class="btn" onclick="greet('用户')">问候用户</button>
            <div id="result" class="result">
                <p id="resultText"></p>
            </div>
        </div>
        <div class="footer">
            <p>由 OpenClaw AI 助手部署</p>
            <p><span class="badge">HTML</span><span class="badge">JavaScript</span><span class="badge">GitHub Pages</span></p>
        </div>
    </div>

    <script>
        // Greet function (frontend version)
        function greet(name) {
            const message = `Hello, ${name}!`;
            const resultDiv = document.getElementById('result');
            const resultText = document.getElementById('resultText');
            
            resultDiv.classList.add('show');
            resultText.textContent = message;
            
            // Animation
            resultDiv.style.opacity = '0';
            resultDiv.style.transform = 'translateY(-10px)';
            setTimeout(() => {
                resultDiv.style.transition = 'opacity 0.3s, transform 0.3s';
                resultDiv.style.opacity = '1';
                resultDiv.style.transform = 'translateY(0)';
            }, 50);
        }
    </script>
</body>
</html>
